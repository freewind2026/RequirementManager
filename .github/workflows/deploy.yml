name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4.3.1
        with:
          name: frontend-build
          path: frontend/dist

      - name: Upload backend code
        uses: actions/upload-artifact@v4.3.1
        with:
          name: backend-code
          path: backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download frontend build
        uses: actions/download-artifact@v4.1.1
        with:
          name: frontend-build
          path: frontend/dist

      - name: Download backend code
        uses: actions/download-artifact@v4.1.1
        with:
          name: backend-code
          path: backend

      - name: Copy files to ECS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT || 22 }}
          source: "backend,frontend/dist"
          target: "/tmp/deploy"

      - name: Deploy to Aliyun ECS via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT || 22 }}
          script: |
            set -e
            
            PROJECT_DIR="/www/wwwroot/requirement_manager"
            mkdir -p $PROJECT_DIR
            
            if [ -d "$PROJECT_DIR/backend" ]; then
              mv $PROJECT_DIR $PROJECT_DIR.backup.$(date +%Y%m%d_%H%M%S)
              mkdir -p $PROJECT_DIR
            fi
            
            cp -r /tmp/deploy/backend $PROJECT_DIR/
            cp -r /tmp/deploy/frontend/dist $PROJECT_DIR/frontend_dist
            
            cd $PROJECT_DIR
            
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip
            
            sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev pkg-config build-essential python3-dev
            
            pip install django djangorestframework djangorestframework-simplejwt django-cors-headers mysqlclient
            
            cd backend
            echo "DATABASES = {'default': {'ENGINE': 'django.db.backends.mysql', 'NAME': 'requirement_manager', 'USER': 'root', 'PASSWORD': '${{ secrets.MYSQL_PASSWORD }}', 'HOST': 'localhost', 'PORT': '3306', 'OPTIONS': {'charset': 'utf8mb4'}}}" > requirement_manager/local_settings.py
            
            python manage.py migrate
            python manage.py collectstatic --noinput
            
            mkdir -p $PROJECT_DIR/staticfiles
            rm -rf $PROJECT_DIR/staticfiles/*
            cp -r $PROJECT_DIR/frontend_dist/* $PROJECT_DIR/staticfiles/
            
            chown -R www-data:www-data $PROJECT_DIR
            
            if [ ! -f "/etc/systemd/system/requirement_manager.service" ]; then
              echo "[Unit]" > /etc/systemd/system/requirement_manager.service
              echo "Description=Requirement Manager Gunicorn Service" >> /etc/systemd/system/requirement_manager.service
              echo "After=network.target" >> /etc/systemd/system/requirement_manager.service
              echo "" >> /etc/systemd/system/requirement_manager.service
              echo "[Service]" >> /etc/systemd/system/requirement_manager.service
              echo "User=www-data" >> /etc/systemd/system/requirement_manager.service
              echo "Group=www-data" >> /etc/systemd/system/requirement_manager.service
              echo "WorkingDirectory=/www/wwwroot/requirement_manager/backend" >> /etc/systemd/system/requirement_manager.service
              echo "ExecStart=/www/wwwroot/requirement_manager/venv/bin/gunicorn --workers 3 --bind 127.0.0.1:8000 requirement_manager.wsgi:application" >> /etc/systemd/system/requirement_manager.service
              echo "Restart=always" >> /etc/systemd/system/requirement_manager.service
              echo "" >> /etc/systemd/system/requirement_manager.service
              echo "[Install]" >> /etc/systemd/system/requirement_manager.service
              echo "WantedBy=multi-user.target" >> /etc/systemd/system/requirement_manager.service
            fi
            
            systemctl daemon-reload
            systemctl enable requirement_manager
            systemctl restart requirement_manager
            
            echo "server {" > /etc/nginx/sites-available/requirement_manager
            echo "    listen 80;" >> /etc/nginx/sites-available/requirement_manager
            echo "    server_name _;" >> /etc/nginx/sites-available/requirement_manager
            echo "" >> /etc/nginx/sites-available/requirement_manager
            echo "    root /www/wwwroot/requirement_manager/staticfiles;" >> /etc/nginx/sites-available/requirement_manager
            echo "    index index.html;" >> /etc/nginx/sites-available/requirement_manager
            echo "" >> /etc/nginx/sites-available/requirement_manager
            echo "    location / {" >> /etc/nginx/sites-available/requirement_manager
            echo "        try_files \$uri \$uri/ /index.html;" >> /etc/nginx/sites-available/requirement_manager
            echo "    }" >> /etc/nginx/sites-available/requirement_manager
            echo "" >> /etc/nginx/sites-available/requirement_manager
            echo "    location /api/ {" >> /etc/nginx/sites-available/requirement_manager
            echo "        proxy_pass http://127.0.0.1:8000;" >> /etc/nginx/sites-available/requirement_manager
            echo "        proxy_set_header Host \$host;" >> /etc/nginx/sites-available/requirement_manager
            echo "        proxy_set_header X-Real-IP \$remote_addr;" >> /etc/nginx/sites-available/requirement_manager
            echo "        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;" >> /etc/nginx/sites-available/requirement_manager
            echo "        proxy_set_header X-Forwarded-Proto \$scheme;" >> /etc/nginx/sites-available/requirement_manager
            echo "    }" >> /etc/nginx/sites-available/requirement_manager
            echo "}" >> /etc/nginx/sites-available/requirement_manager
            
            rm -f /etc/nginx/sites-enabled/default
            ln -sf /etc/nginx/sites-available/requirement_manager /etc/nginx/sites-enabled/
            
            nginx -t && systemctl restart nginx
            
            rm -rf /tmp/deploy
            
            echo "Deployment completed successfully!"