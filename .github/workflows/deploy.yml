name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4.3.1
        with:
          name: frontend-build
          path: frontend/dist

      - name: Upload backend code
        uses: actions/upload-artifact@v4.3.1
        with:
          name: backend-code
          path: backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download frontend build
        uses: actions/download-artifact@v4.1.1
        with:
          name: frontend-build
          path: frontend/dist

      - name: Download backend code
        uses: actions/download-artifact@v4.1.1
        with:
          name: backend-code
          path: backend

      - name: Copy files to ECS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT || 22 }}
          source: "backend,frontend/dist"
          target: "/tmp/deploy"

      - name: Deploy to Aliyun ECS via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT || 22 }}
          script: |
            set -e
            
            PROJECT_DIR="/www/wwwroot/requirement_manager"
            mkdir -p $PROJECT_DIR
            
            if [ -d "$PROJECT_DIR/backend" ]; then
              mv $PROJECT_DIR $PROJECT_DIR.backup.$(date +%Y%m%d_%H%M%S)
              mkdir -p $PROJECT_DIR
            fi
            
            cp -r /tmp/deploy/backend $PROJECT_DIR/
            cp -r /tmp/deploy/frontend/dist $PROJECT_DIR/frontend_dist
            
            cd $PROJECT_DIR
            
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip
            
            sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev pkg-config build-essential python3-dev
            
            pip install django djangorestframework djangorestframework-simplejwt django-cors-headers mysqlclient
            
            cd backend
            echo "DATABASES = {'default': {'ENGINE': 'django.db.backends.mysql', 'NAME': 'requirement_manager', 'USER': 'root', 'PASSWORD': '${{ secrets.MYSQL_PASSWORD }}', 'HOST': 'localhost', 'PORT': '3306', 'OPTIONS': {'charset': 'utf8mb4'}}}" > requirement_manager/local_settings.py
            
            python manage.py migrate
            python manage.py collectstatic --noinput
            
            # 创建 staticfiles 目录（确保存在）
            mkdir -p staticfiles
            rm -rf staticfiles/*
            cp -r ../frontend_dist/* staticfiles/
            
            chown -R www-data:www-data $PROJECT_DIR
            
            # 创建 Gunicorn 服务配置文件（如果不存在）
            if [ ! -f "/etc/systemd/system/requirement_manager.service" ]; then
              echo "[Unit]
Description=Requirement Manager Gunicorn Service
After=network.target

[Service]
User=www-data
Group=www-data
WorkingDirectory=$PROJECT_DIR/backend
ExecStart=$PROJECT_DIR/venv/bin/gunicorn --workers 3 --bind 127.0.0.1:8000 requirement_manager.wsgi:application
Restart=always

[Install]
WantedBy=multi-user.target" > /etc/systemd/system/requirement_manager.service
            fi
            
            # 重启服务
            systemctl daemon-reload
            systemctl enable requirement_manager
            systemctl restart requirement_manager
            
            # 创建/更新 Nginx 配置
            echo "server {
    listen 80;
    server_name _;

    root $PROJECT_DIR/staticfiles;
    index index.html;

    location / {
        try_files \$uri \$uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }
}" > /etc/nginx/sites-available/requirement_manager
            
            # 启用 Nginx 配置
            rm -f /etc/nginx/sites-enabled/default
            ln -sf /etc/nginx/sites-available/requirement_manager /etc/nginx/sites-enabled/
            
            # 测试并重启 Nginx
            nginx -t && systemctl restart nginx
            
            rm -rf /tmp/deploy
            
            echo "Deployment completed successfully!"