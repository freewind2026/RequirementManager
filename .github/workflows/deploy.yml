name: Deploy to Aliyun ECS with RAM User

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4.3.1
        with:
          name: frontend-build
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.0

      - name: Download frontend build
        uses: actions/download-artifact@v4.1.1
        with:
          name: frontend-build
          path: frontend/dist

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          aws-region: ${{ secrets.ALIYUN_REGION }}

      - name: Deploy to Aliyun ECS
        uses: aliyun/ecs-deploy@v1
        with:
          access-key-id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          region-id: ${{ secrets.ALIYUN_REGION }}
          instance-id: ${{ secrets.ALIYUN_INSTANCE_ID }}
          script: |
            set -e
            
            PROJECT_DIR="/www/wwwroot/requirement_manager"
            mkdir -p $PROJECT_DIR
            
            if [ -d "$PROJECT_DIR/backend" ]; then
              mv $PROJECT_DIR $PROJECT_DIR.backup.$(date +%Y%m%d_%H%M%S)
              mkdir -p $PROJECT_DIR
            fi
            
            cd /tmp
            git clone https://github.com/freewind2026/RequirementManager.git temp_repo
            cp -r temp_repo/backend $PROJECT_DIR/
            cp -r temp_repo/frontend/dist $PROJECT_DIR/frontend_dist
            rm -rf temp_repo
            
            cd $PROJECT_DIR
            
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip
            pip install django djangorestframework djangorestframework-simplejwt django-cors-headers mysqlclient
            
            cd backend
            echo "DATABASES = {'default': {'ENGINE': 'django.db.backends.mysql', 'NAME': 'requirement_manager', 'USER': 'root', 'PASSWORD': '${{ secrets.MYSQL_PASSWORD }}', 'HOST': 'localhost', 'PORT': '3306', 'OPTIONS': {'charset': 'utf8mb4'}}}" > requirement_manager/local_settings.py
            
            python manage.py migrate
            python manage.py collectstatic --noinput
            
            rm -rf static/*
            cp -r ../frontend_dist/* static/
            
            chown -R www-data:www-data $PROJECT_DIR
            
            if [ -f "/etc/systemd/system/requirement_manager.service" ]; then
              systemctl daemon-reload
              systemctl restart requirement_manager
            else
              echo "Service file not found, please create it manually"
            fi
            
            systemctl restart nginx
            
            echo "Deployment completed successfully!"
